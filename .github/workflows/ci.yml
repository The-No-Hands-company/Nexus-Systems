name: Nexus Systems CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── TypeScript / Bun apps ────────────────────────────────────────
  bun-apps:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - Nexus-Design
          - Nexus-Draw
          - Nexus-Graphic
          - Nexus-Photos
          - Nexus-Video
          - Nexus-Notes
          - Nexus-Tasks
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install deps (npm, more reliable in CI)
        run: cd apps/${{ matrix.app }} && npm install --prefer-offline 2>/dev/null || npm install
      - name: Typecheck
        run: cd apps/${{ matrix.app }} && npx tsc --noEmit
      - name: Test
        run: cd apps/${{ matrix.app }} && bun test
        env:
          NEXUS_CLOUD_ENABLE_CLOUD_INTEGRATION: "false"

  # ── Rust engines ─────────────────────────────────────────────────
  rust-engines:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - Nexus-Design
          - Nexus-Draw
          - Nexus-Graphic
          - Nexus-Photos
          - Nexus-Video
          - Nexus-GPU-Test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build + Test
        run: cd apps/${{ matrix.app }}/engine && cargo test

  # ── React frontends ──────────────────────────────────────────────
  frontends:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - Nexus-Design
          - Nexus-Draw
          - Nexus-Graphic
          - Nexus-Photos
          - Nexus-Video
          - Nexus-GPU-Test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install + Build
        run: cd apps/${{ matrix.app }}/frontend && npm install && npx tsc --noEmit && npx vite build

  # ── API Contract Validation ──────────────────────────────────────
  contracts:
    runs-on: ubuntu-latest
    needs: [bun-apps]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install Cloud deps
        run: cd apps/Nexus-Cloud && npm install --prefer-offline 2>/dev/null || npm install
      - name: Symlink node_modules for apps
        run: |
          for app in $(ls apps/ | grep -E '^Nexus-[A-Z]'); do
            [ -f "apps/$app/package.json" ] && [ ! -d "apps/$app/node_modules" ] && \
              ln -sfn "$PWD/apps/Nexus-Cloud/node_modules" "apps/$app/node_modules" 2>/dev/null
          done
      - name: Fix data directories
        run: |
          for app in apps/*/; do
            [ ! -e "$app/data" ] && ln -sfn ../../data "$app/data" 2>/dev/null
          done
      - name: Run contract validation
        run: chmod +x scripts/test/contract-test.sh && ./scripts/test/contract-test.sh

  # ── Integration Smoke Test ───────────────────────────────────────
  smoke:
    runs-on: ubuntu-latest
    needs: [bun-apps]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install Cloud deps
        run: cd apps/Nexus-Cloud && npm install --prefer-offline 2>/dev/null || npm install
      - name: Symlink node_modules + fix data
        run: |
          for app in $(ls apps/ | grep -E '^Nexus-[A-Z]'); do
            [ -f "apps/$app/package.json" ] && [ ! -d "apps/$app/node_modules" ] && \
              ln -sfn "$PWD/apps/Nexus-Cloud/node_modules" "apps/$app/node_modules" 2>/dev/null
            [ ! -e "apps/$app/data" ] && ln -sfn ../../data "apps/$app/data" 2>/dev/null
          done
      - name: Run smoke test
        run: chmod +x scripts/test/smoke-test.sh && ./scripts/test/smoke-test.sh
